dataclaw_test:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'dataclaw') }}"
      pass: "{{ env_var('POSTGRES_PASSWORD', 'dataclaw123') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'dataclaw_test') }}"
      schema: public
      threads: 4
